name: starliner

services:
  traefik:
    build:
      context: .
      dockerfile: .docker/traefik/Dockerfile
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=internal"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=0s"
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=0s"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=600s"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ./.docker/traefik/dynamic:/etc/traefik/dynamic:ro
      - ./.docker/traefik/certs:/certs:ro
    depends_on:
      - client
      - server-api
    networks:
      - internal

  auth:
    build:
      context: .
      dockerfile: .docker/auth/Dockerfile
      target: development
    environment:
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-awVYP4Nisp2GBy87phEel7ZHGNXx4Hfl}
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL:-postgres://postgres:postgres@auth-db:5432/auth_db}
      CLIENT_BASE_URL: ${CLIENT_BASE_URL:-https://dev.starliner.app}
      SERVER_BASE_URL: ${SERVER_BASE_URL:-server-api:9090}
      SERVER_BASIC_AUTH_USER: ${SERVER_BASIC_AUTH_USER:-test}
      SERVER_BASIC_AUTH_PASSWORD: ${SERVER_BASIC_AUTH_PASSWORD:-test}
      AUTH_PUBLIC_URL: ${AUTH_PUBLIC_URL:-https://auth.dev.starliner.app}
    depends_on:
      auth-db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./auth:/app
      - node-modules-auth:/app/node_modules
    networks:
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.auth.rule=Host(`auth.dev.starliner.app`)
      - traefik.http.routers.auth.entrypoints=websecure
      - traefik.http.routers.auth.tls=true
      - traefik.http.services.auth.loadbalancer.server.port=3000

  client:
    restart: unless-stopped
    build:
      context: .
      dockerfile: .docker/client/Dockerfile
      target: development-dependencies-env
    command: sh -c "npm run dev -- --host 0.0.0.0"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      SERVER_BASE_URL: ${SERVER_BASE_URL:-server-api:9090}
      SERVER_BASIC_AUTH_USER: ${SERVER_BASIC_AUTH_USER:-test}
      SERVER_BASIC_AUTH_PASSWORD: ${SERVER_BASIC_AUTH_PASSWORD:-test}
      AUTH_URL: ${AUTH_URL:-http://auth:3000}
      AUTH_PUBLIC_URL: ${AUTH_PUBLIC_URL:-https://auth.dev.starliner.app}
      GITHUB_APP_NAME: ${GITHUB_APP_NAME:-dev-starliner-app}
    volumes:
      - ./client:/app
      - node-modules-client:/app/node_modules
    networks:
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.client.rule=Host(`dev.starliner.app`)
      - traefik.http.routers.client.entrypoints=websecure
      - traefik.http.routers.client.tls=true
      - traefik.http.services.client.loadbalancer.server.port=5173

  server-api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: .docker/server/api/Dockerfile
      target: dev
    depends_on:
      db:
        condition: service_healthy
      s3:
        condition: service_healthy
    ports:
      - "9090:9090"
      - "40000:40000"
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-main}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-test}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-test}
      CLUSTER_GRPC_ENDPOINT: ${CLUSTER_GRPC_ENDPOINT:-server-cluster:57400}
      BUILDER_GRPC_ENDPOINT: ${BUILDER_GRPC_ENDPOINT:-server-builder:57500}
      PROVISIONER_GRPC_ENDPOINT: ${PROVISIONER_GRPC_ENDPOINT:-server-provisioner:57400}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://s3:8333}
      NATS_URL: ${NATS_URL:-http://nats:4222}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-access-key-123}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-secret-key-123}
      ENCRYPTION_KEY_BASE64: ${ENCRYPTION_KEY_BASE64:-D8gwlwA/vul5rfmnMeMI0Y5bdbZHYQhyTsOlvpk4RaI=}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      SENDER_MAIL: ${SENDER_MAIL:-no-reply@starliner.dev}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_TLS_ENABLED: ${SMTP_TLS_ENABLED:-false}
      IMAGE_REGISTRY_URL: ${IMAGE_REGISTRY_URL:-registry.staging.starliner.app}
      IMAGE_REGISTRY_USERNAME: ${IMAGE_REGISTRY_USERNAME:-server}
      IMAGE_REGISTRY_PASSWORD: ${IMAGE_REGISTRY_PASSWORD}
    volumes:
      - ./server:/app
    networks:
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.webhooks.rule=Host(`dev.starliner.app`) && PathPrefix(`/webhooks/`)
      - traefik.http.routers.webhooks.entrypoints=websecure
      - traefik.http.routers.webhooks.tls=true
      - traefik.http.routers.webhooks.priority=100
      - traefik.http.services.webhooks.loadbalancer.server.port=9090

  server-builder:
    restart: unless-stopped
    build:
      context: .
      dockerfile: .docker/server/builder/Dockerfile
      target: dev
    depends_on:
      s3:
        condition: service_healthy
    ports:
      - "40001:40001"
      - "57500:57500"
    environment:
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://s3:8333}
      NATS_URL: ${NATS_URL:-http://nats:4222}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-access-key-123}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-secret-key-123}
      IMAGE_REGISTRY_URL: ${IMAGE_REGISTRY_URL:-registry.staging.starliner.app}
      IMAGE_REGISTRY_USERNAME: ${IMAGE_REGISTRY_USERNAME:-server}
      IMAGE_REGISTRY_PASSWORD: ${IMAGE_REGISTRY_PASSWORD}
    volumes:
      - ./server:/app
    networks:
      - internal

  server-cluster:
    restart: unless-stopped
    build:
      context: .
      dockerfile: .docker/server/cluster/Dockerfile
      target: dev
    ports:
      - "40002:40002"
      - "57400:57400"
    environment:
      NATS_URL: ${NATS_URL:-http://nats:4222}
      ENCRYPTION_KEY_BASE64: ${ENCRYPTION_KEY_BASE64:-D8gwlwA/vul5rfmnMeMI0Y5bdbZHYQhyTsOlvpk4RaI=}
    volumes:
      - ./server:/app
    networks:
      - internal

  server-provisioner:
    restart: unless-stopped
    build:
      context: .
      dockerfile: .docker/server/provisioner/Dockerfile
      target: dev
    ports:
      - "40003:40003"
    environment:
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://s3:8333}
      NATS_URL: ${NATS_URL:-http://nats:4222}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-access-key-123}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-secret-key-123}
      ENCRYPTION_KEY_BASE64: ${ENCRYPTION_KEY_BASE64:-D8gwlwA/vul5rfmnMeMI0Y5bdbZHYQhyTsOlvpk4RaI=}
      PULUMI_BACKEND_URL: ${PULUMI_BACKEND_URL:-s3://pulumi-backend?endpoint=s3:8333&region=none&disableSSL=true&s3ForcePathStyle=true}
      PULUMI_CONFIG_PASSPHRASE: ${PULUMI_CONFIG_PASSPHRASE:-test}
    volumes:
      - ./server:/app
    networks:
      - internal

  db:
    restart: unless-stopped
    build:
      context: .
      dockerfile: .docker/postgres/Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-main}
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U postgres -d main'" ]
      interval: 10s
      timeout: 3s
      retries: 3
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal

  auth-db:
    restart: unless-stopped
    build:
      context: .
      dockerfile: .docker/postgres/Dockerfile
    environment:
      POSTGRES_USER: ${AUTH_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${AUTH_POSTGRES_DB:-auth_db}
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U postgres -d auth_db'" ]
      interval: 10s
      timeout: 3s
      retries: 3
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - internal

  nats:
    restart: unless-stopped
    build:
      context: .
      dockerfile: .docker/nats/Dockerfile
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data/jetstream
    command: ["-c", "/etc/nats/nats.conf"]
    networks:
      - internal

  nats-box:
    restart: unless-stopped
    build:
      context: .docker/nats-box
      dockerfile: Dockerfile
    depends_on:
      - nats
    entrypoint: /bin/sh
    tty: true
    networks:
      - internal

  master:
    build:
      context: .
      dockerfile: .docker/seaweedfs/Dockerfile
    ports:
      - "9333:9333"
      - "19333:19333"
    command: "-v=1 master -volumeSizeLimitMB 100 -resumeState=false -ip=master -ip.bind=0.0.0.0 -port=9333 -mdir=/var/lib/seaweedfs/master"
    volumes:
      - .docker/seaweedfs/data/master:/var/lib/seaweedfs/master
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9333 || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  volume1:
    build:
      context: .
      dockerfile: .docker/seaweedfs/Dockerfile
    ports:
      - "8081:8081"
      - "18080:18080"
    command: 'volume -dataCenter=dc1 -rack=v1 -mserver="master:9333" -port=8081 -preStopSeconds=1 -dir=/var/lib/seaweedfs/volume1'
    volumes:
      - .docker/seaweedfs/data/volume1:/var/lib/seaweedfs/volume1
    depends_on:
      master:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://volume1:8081/status || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  volume2:
    build:
      context: .
      dockerfile: .docker/seaweedfs/Dockerfile
    ports:
      - "8082:8082"
      - "18082:18082"
    command: 'volume -dataCenter=dc2 -rack=v2 -mserver="master:9333" -port=8082 -preStopSeconds=1 -dir=/var/lib/seaweedfs/volume2'
    volumes:
      - .docker/seaweedfs/data/volume2:/var/lib/seaweedfs/volume2
    depends_on:
      master:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://volume2:8082/status || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  filer:
    build:
      context: .
      dockerfile: .docker/seaweedfs/Dockerfile
    ports:
      - "8888:8888"
      - "18888:18888"
    command: 'filer -defaultReplicaPlacement=100 -iam -master="master:9333"'
    volumes:
      - .docker/seaweedfs/data/filer:/data
    depends_on:
      volume1:
        condition: service_healthy
      volume2:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8888 || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  s3:
    build:
      context: .
      dockerfile: .docker/seaweedfs/Dockerfile
    ports:
      - "8333:8333"
    command: '-v=9 s3 -filer="filer:8888" -ip.bind=0.0.0.0'
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-access-key-123}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-secret-key-123}
    depends_on:
      filer:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8333/status || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  buildkit:
    build:
      context: .
      dockerfile: .docker/buildkit/Dockerfile
    privileged: true
    restart: unless-stopped
    volumes:
      - ./.docker/buildkit/buildkitd.toml:/etc/buildkit/buildkitd.toml:ro
      - buildkit-data:/var/lib/buildkit
    networks:
      - internal

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    ports:
      - 8025:8025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - internal

volumes:
  node-modules-client:
  node-modules-auth:
  auth-db-data:
  db-data:
  nats-data:
  registry-data:
  buildkit-data:

networks:
  internal: