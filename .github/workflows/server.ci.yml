name: Server Linters
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  server-lint:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: server/go.sum

      - name: Install pgFormatter 5.9
        run: |
          version=5.9
          curl -fsSL "https://github.com/darold/pgFormatter/archive/refs/tags/v${version}.tar.gz" -o pgformatter.tar.gz
          tar xzf pgformatter.tar.gz
          echo "$PWD/pgFormatter-${version}" >> "$GITHUB_PATH"
          "$PWD/pgFormatter-${version}/pg_format" --version

      - name: Check SQL formatting
        run: |
          find . -name "*.sql" -exec pg_format -c .pg_format -i {} \;

          git diff --exit-code
        working-directory: server

      - name: Install Arch-Go
        run: go install -v github.com/arch-go/arch-go/v2@latest
        working-directory: server

      - name: Run architecture check
        run: |
          go mod download
          go mod verify
          arch-go
        working-directory: server

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          working-directory: server

      - name: Run vulnerabilities check
        run: |
          go run golang.org/x/vuln/cmd/govulncheck@latest ./...
        working-directory: server