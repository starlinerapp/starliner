listen: 0.0.0.0:4222
http: 8222

jetstream {
  store_dir: /data/jetstream
  max_mem_store: 1Gb
  max_file_store: 10Gb
}

accounts {
  SYS {
    users = [
      { user = $NATS_SYS_USER, password = $NATS_SYS_PASSWORD }
    ]
  }
  APP {
    jetstream = enabled
    users = [
      { user = app }
    ]
  }
}

system_account = SYS
no_auth_user = app