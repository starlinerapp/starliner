upstream client {
    server client:5173;
}

upstream registry {
    server registry.dev:5000;
}


server {
    listen 80;
    listen 443 ssl;
    server_name dev.starliner.app;

    ssl_certificate     /etc/nginx/dev.starliner.app.crt;
    ssl_certificate_key /etc/nginx/dev.starliner.app.key;

    client_max_body_size 100M;

    proxy_connect_timeout 7d;
    proxy_send_timeout 7d;
    proxy_read_timeout 7d;

    location / {
        proxy_pass http://client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
      }
}

server {
    listen 80;
    listen 443 ssl;
    server_name registry.dev.starliner.app;

    ssl_certificate     /etc/nginx/registry.dev.starliner.app.crt;
    ssl_certificate_key /etc/nginx/registry.dev.starliner.app.key;

    client_max_body_size 100M;

    proxy_connect_timeout 7d;
    proxy_send_timeout 7d;
    proxy_read_timeout 7d;

    location / {
        proxy_pass http://registry;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
      }
}