upstream client {
    server client:5173;
}

upstream server {
    server server-api:9090;
}

upstream mcp {
    server mcp-server:8080;
}

server {
    listen 80;
    listen 443 ssl;
    server_name dev.starliner.app;

    ssl_certificate     /etc/nginx/dev.starliner.app.crt;
    ssl_certificate_key /etc/nginx/dev.starliner.app.key;

    client_max_body_size 100M;

    proxy_connect_timeout 7d;
    proxy_send_timeout 7d;
    proxy_read_timeout 7d;

    location ^~ /webhooks/ {
        proxy_pass http://server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        proxy_request_buffering off;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
      }
}

server {
    listen 80;
    listen 443 ssl;
    server_name mcp.dev.starliner.app;

    ssl_certificate     /etc/nginx/mcp.dev.starliner.app.crt;
    ssl_certificate_key /etc/nginx/mcp.dev.starliner.app.key;

    client_max_body_size 100M;

    proxy_connect_timeout 7d;
    proxy_send_timeout 7d;
    proxy_read_timeout 7d;

    location / {
        proxy_pass http://mcp;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
      }
}