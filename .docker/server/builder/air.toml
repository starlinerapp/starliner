root = "."
tmp_dir = "build"

env_files = [".env"]

[build]
cmd = "go build -gcflags='all=-N -l' -o ./build/builder ./cmd/builder/main.go"
bin = "./build/builder"
full_bin = "dlv exec --accept-multiclient --headless --continue --log --listen=:40001 --api-version=2 ./build/builder --"
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
include_dir = ["cmd/builder", "internal/builder", "internal/core"]
include_file = ["go.mod", "go.sum"]
exclude_dir = ["build", "tmp"]
exclude_regex = ["_test\\.go"]
delay = 1000
send_interrupt = true
kill_delay = 2000
stop_on_error = true

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = false

[screen]
clear_on_rebuild = true
keep_scroll = true
