definitions:
  request.CreateCluster:
    properties:
      name:
        type: string
      organizationId:
        type: integer
      serverType:
        type: string
    required:
    - name
    - organizationId
    - serverType
    type: object
  request.CreateEnvironment:
    properties:
      name:
        type: string
      organization_id:
        type: integer
      project_id:
        type: integer
    required:
    - name
    - organization_id
    - project_id
    type: object
  request.CreateOrganization:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  request.CreateProject:
    properties:
      cluster_id:
        type: integer
      name:
        type: string
      organization_id:
        type: integer
    required:
    - cluster_id
    - name
    - organization_id
    type: object
  request.DeployDatabase:
    properties:
      environmentId:
        type: integer
      serviceName:
        type: string
    required:
    - environmentId
    - serviceName
    type: object
  request.DeployFromGit:
    properties:
      dockerfilePath:
        type: string
      environmentId:
        type: integer
      envs:
        items:
          $ref: '#/definitions/request.EnvVar'
        type: array
      gitUrl:
        type: string
      port:
        type: integer
      projectRepositoryPath:
        type: string
      serviceName:
        type: string
    required:
    - dockerfilePath
    - environmentId
    - envs
    - gitUrl
    - port
    - projectRepositoryPath
    - serviceName
    type: object
  request.DeployImage:
    properties:
      environmentId:
        type: integer
      envs:
        items:
          $ref: '#/definitions/request.EnvVar'
        type: array
      imageName:
        type: string
      port:
        type: integer
      serviceName:
        type: string
      tag:
        type: string
    required:
    - environmentId
    - envs
    - imageName
    - port
    - serviceName
    - tag
    type: object
  request.DeployIngress:
    properties:
      environmentId:
        type: integer
      ingressHosts:
        items:
          $ref: '#/definitions/request.IngressHost'
        type: array
    required:
    - environmentId
    - ingressHosts
    type: object
  request.EnvVar:
    properties:
      name:
        type: string
      value:
        type: string
    required:
    - name
    - value
    type: object
  request.IngressHost:
    properties:
      host:
        type: string
      paths:
        items:
          $ref: '#/definitions/request.IngressPath'
        type: array
    required:
    - host
    - paths
    type: object
  request.IngressPath:
    properties:
      path:
        type: string
      pathType:
        enum:
        - Prefix
        - Exact
        type: string
      serviceName:
        type: string
    required:
    - path
    - pathType
    - serviceName
    type: object
  request.UpdateDeployFromGit:
    properties:
      dockerfilePath:
        type: string
      environmentId:
        type: integer
      envs:
        items:
          $ref: '#/definitions/request.EnvVar'
        type: array
      port:
        type: integer
      projectRepositoryPath:
        type: string
    required:
    - dockerfilePath
    - environmentId
    - envs
    - port
    - projectRepositoryPath
    type: object
  request.UpdateImage:
    properties:
      environmentId:
        type: integer
      envs:
        items:
          $ref: '#/definitions/request.EnvVar'
        type: array
      imageName:
        type: string
      port:
        type: integer
      tag:
        type: string
    required:
    - environmentId
    - envs
    - imageName
    - port
    - tag
    type: object
  request.UpdateIngress:
    properties:
      environmentId:
        type: integer
      ingressHosts:
        items:
          $ref: '#/definitions/request.IngressHost'
        type: array
    required:
    - environmentId
    - ingressHosts
    type: object
  request.UpsertHetznerCredential:
    properties:
      apiKey:
        type: string
    required:
    - apiKey
    type: object
  response.Cluster:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      ipv4Address:
        type: string
      name:
        type: string
      organizationId:
        type: integer
      status:
        allOf:
        - $ref: '#/definitions/response.ClusterStatus'
        enum:
        - pending
        - running
        - deleted
    required:
    - createdAt
    - id
    - ipv4Address
    - name
    - organizationId
    - status
    type: object
  response.ClusterStatus:
    enum:
    - pending
    - running
    - deleted
    type: string
    x-enum-varnames:
    - ClusterStatusPending
    - ClusterStatusRunning
    - ClusterStatusDeleted
  response.DatabaseDeployment:
    properties:
      database:
        type: string
      id:
        type: integer
      internalEndpoint:
        type: string
      password:
        type: string
      port:
        type: string
      serviceName:
        type: string
      status:
        type: string
      username:
        type: string
    required:
    - database
    - id
    - internalEndpoint
    - password
    - port
    - serviceName
    - status
    - username
    type: object
  response.Deployments:
    properties:
      databases:
        items:
          $ref: '#/definitions/response.DatabaseDeployment'
        type: array
      gitDeployments:
        items:
          $ref: '#/definitions/response.GitDeployment'
        type: array
      images:
        items:
          $ref: '#/definitions/response.ImageDeployment'
        type: array
      ingresses:
        items:
          $ref: '#/definitions/response.IngressDeployment'
        type: array
    required:
    - databases
    - gitDeployments
    - images
    - ingresses
    type: object
  response.EnvVar:
    properties:
      name:
        type: string
      value:
        type: string
    required:
    - name
    - value
    type: object
  response.Environment:
    properties:
      id:
        type: integer
      name:
        type: string
      slug:
        type: string
    required:
    - id
    - name
    - slug
    type: object
  response.GetOrganizationProvisioningCredentialResponse:
    properties:
      credential:
        $ref: '#/definitions/response.OrganizationProvisioningCredential'
    type: object
  response.GitDeployment:
    properties:
      dockerfilePath:
        type: string
      envVars:
        items:
          $ref: '#/definitions/response.EnvVar'
        type: array
      gitUrl:
        type: string
      id:
        type: integer
      internalEndpoint:
        type: string
      port:
        type: string
      projectRepositoryPath:
        type: string
      serviceName:
        type: string
      status:
        type: string
    required:
    - dockerfilePath
    - envVars
    - gitUrl
    - id
    - internalEndpoint
    - port
    - projectRepositoryPath
    - serviceName
    - status
    type: object
  response.ImageDeployment:
    properties:
      envVars:
        items:
          $ref: '#/definitions/response.EnvVar'
        type: array
      id:
        type: integer
      imageName:
        type: string
      internalEndpoint:
        type: string
      port:
        type: string
      serviceName:
        type: string
      status:
        type: string
      tag:
        type: string
    required:
    - envVars
    - id
    - imageName
    - internalEndpoint
    - port
    - serviceName
    - status
    - tag
    type: object
  response.IngressDeployment:
    properties:
      hosts:
        items:
          $ref: '#/definitions/response.IngressHost'
        type: array
      id:
        type: integer
      port:
        type: string
      serviceName:
        type: string
      status:
        type: string
    required:
    - hosts
    - id
    - port
    - serviceName
    - status
    type: object
  response.IngressHost:
    properties:
      host:
        type: string
      paths:
        items:
          $ref: '#/definitions/response.IngressPath'
        type: array
    required:
    - host
    - paths
    type: object
  response.IngressPath:
    properties:
      path:
        type: string
      pathType:
        enum:
        - Prefix
        - Exact
        type: string
      serviceName:
        type: string
    required:
    - path
    - pathType
    - serviceName
    type: object
  response.Organization:
    properties:
      id:
        type: integer
      name:
        type: string
      owner_id:
        type: integer
      slug:
        type: string
    required:
    - id
    - name
    - owner_id
    - slug
    type: object
  response.OrganizationProvisioningCredential:
    properties:
      provider:
        type: string
      secret:
        type: string
    required:
    - provider
    - secret
    type: object
  response.Project:
    properties:
      clusterId:
        type: integer
      createdAt:
        type: string
      environments:
        items:
          $ref: '#/definitions/response.Environment'
        type: array
      id:
        type: integer
      name:
        type: string
    required:
    - clusterId
    - createdAt
    - environments
    - id
    - name
    type: object
  response.ProjectCluster:
    properties:
      clusterId:
        type: integer
      clusterName:
        type: string
    required:
    - clusterId
    - clusterName
    type: object
  response.Root:
    properties:
      message:
        type: string
    required:
    - message
    type: object
  response.User:
    properties:
      better_auth_id:
        type: string
      user_id:
        type: integer
    required:
    - better_auth_id
    - user_id
    type: object
info:
  contact: {}
  title: Starliner API
  version: "1.0"
paths:
  /:
    get:
      operationId: getRoot
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Root'
      summary: Get root
      tags:
      - root
  /clusters:
    post:
      operationId: createCluster
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Create Cluster
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.CreateCluster'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Cluster'
      summary: Create Cluster
      tags:
      - cluster
  /clusters/{id}:
    delete:
      operationId: deleteCluster
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
      summary: Delete Cluster
      tags:
      - cluster
    get:
      operationId: getCluster
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Cluster'
      summary: Get Cluster
      tags:
      - cluster
  /clusters/{id}/private-key:
    get:
      operationId: getClusterPrivateKey
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: Get Cluster Private Key
      tags:
      - cluster
  /deployments/{id}:
    delete:
      operationId: deleteDeployment
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Deployment ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
      summary: Delete deployment
      tags:
      - deployment
  /deployments/{id}/logs:
    get:
      operationId: streamDeploymentLogs
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Deployment ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          headers:
            Cache-Control:
              description: no-cache
              type: string
            Connection:
              description: keep-alive
              type: string
            Content-Type:
              description: text/event-stream
              type: string
      summary: Stream deployment logs
      tags:
      - deployment
  /deployments/databases:
    post:
      operationId: deployDatabase
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Deploy Database
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.DeployDatabase'
      responses:
        "200":
          description: OK
      summary: Deploy database
      tags:
      - deployment
  /deployments/git:
    post:
      operationId: deployFromGitRepository
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Deploy from Git
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.DeployFromGit'
      responses:
        "200":
          description: OK
      summary: Deploy from Git Repository
      tags:
      - deployment
  /deployments/git/{deploymentId}:
    put:
      operationId: updateDeployFromGitRepository
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Deployment ID
        in: path
        name: deploymentId
        required: true
        type: integer
      - description: Update Deploy from Git
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.UpdateDeployFromGit'
      responses:
        "200":
          description: OK
      summary: Update Deploy from Git
      tags:
      - deployment
  /deployments/images:
    post:
      operationId: deployImage
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Deploy Image
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.DeployImage'
      responses:
        "200":
          description: OK
      summary: Deploy image
      tags:
      - deployment
  /deployments/images/{deploymentId}:
    put:
      operationId: updateImageDeployment
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Deployment ID
        in: path
        name: deploymentId
        required: true
        type: integer
      - description: Update Image
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.UpdateImage'
      responses:
        "200":
          description: OK
      summary: Update image deployment
      tags:
      - deployment
  /deployments/ingresses:
    post:
      operationId: deployIngress
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Deploy Ingress
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.DeployIngress'
      responses:
        "200":
          description: OK
      summary: Deploy ingress
      tags:
      - deployment
  /deployments/ingresses/{deploymentId}:
    put:
      operationId: updateIngressDeployment
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Deployment ID
        in: path
        name: deploymentId
        required: true
        type: integer
      - description: Update Ingress
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.UpdateIngress'
      responses:
        "200":
          description: OK
      summary: Update ingress deployment
      tags:
      - deployment
  /environments:
    post:
      operationId: createEnvironment
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Create Environment
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.CreateEnvironment'
      responses:
        "201":
          description: Created
      summary: Create Environment
      tags:
      - environment
  /environments/{id}/deployments:
    get:
      operationId: getEnvironmentDeployments
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Environment ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Deployments'
      summary: Get Environment Deployments
      tags:
      - environment
  /me:
    get:
      operationId: getUser
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.User'
      summary: Get current user
      tags:
      - user
  /organizations:
    get:
      operationId: getUserOrganizations
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/response.Organization'
            type: array
      summary: Get user organizations
      tags:
      - organization
    post:
      operationId: createOrganization
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Create Organization
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.CreateOrganization'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Organization'
      summary: Create organization
      tags:
      - organization
  /organizations/{id}/clusters:
    get:
      operationId: getOrganizationClusters
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Organization ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/response.Cluster'
            type: array
      summary: Get Organization Clusters
      tags:
      - organization
  /organizations/{id}/projects:
    get:
      operationId: getOrganizationProjects
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Organization ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/response.Project'
            type: array
      summary: Get Organization Projects
      tags:
      - organization
  /organizations/{id}/settings/credential/hetzner:
    get:
      operationId: getHetznerCredential
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Organization ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.GetOrganizationProvisioningCredentialResponse'
      summary: Get Hetzner Provisioning Credential
      tags:
      - organization
    post:
      operationId: upsertHetznerCredential
      parameters:
      - description: Upsert Hetzner Credential
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.UpsertHetznerCredential'
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Organization ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
      summary: Upsert Hetzner Provisioning Credential
      tags:
      - organization
  /projects:
    post:
      operationId: createProject
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Create Project
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.CreateProject'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Project'
      summary: Create Project
      tags:
      - project
  /projects/{id}:
    delete:
      operationId: deleteProject
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Project ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
      summary: Delete Project
      tags:
      - project
    get:
      operationId: getProject
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Project ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Project'
      summary: Get Project
      tags:
      - project
  /projects/{id}/cluster:
    get:
      operationId: getProjectCluster
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Project ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ProjectCluster'
      summary: Get Project Cluster
      tags:
      - project
securityDefinitions:
  BasicAuth:
    type: basic
swagger: "2.0"
