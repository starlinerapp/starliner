syntax = "proto3";

package proto.v1;

option go_package = "starliner.app/internal/core/infrastructure/grpc/proto/v1";

message StreamDeploymentStatusLogsRequest {
  string namespace = 1;
  string release_name = 2;
  string kubeconfig_base64 = 3;
  string commit_hash = 4;
  int64 deployment_id = 5;
}

message StreamDeploymentStatusLogsResponse {
  bytes chunk = 1;
}

service DeploymentStatusLogService {
  rpc StreamDeploymentStatusLogs(StreamDeploymentStatusLogsRequest) returns (stream StreamDeploymentStatusLogsResponse);
}

message StreamIngressDeploymentStatusLogsRequest {
  string namespace = 1;
  string release_name = 2;
  string kubeconfig_base64 = 3;
}

message StreamIngressDeploymentStatusLogsResponse {
  bytes chunk = 1;
}

service IngressDeploymentStatusLogService {
  rpc StreamIngressDeploymentStatusLogs(StreamIngressDeploymentStatusLogsRequest) returns (stream StreamIngressDeploymentStatusLogsResponse);
}