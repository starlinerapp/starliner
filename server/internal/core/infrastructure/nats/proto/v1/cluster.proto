syntax = "proto3";

package proto.v1;

option go_package = "starliner.app/proto/v1";

message Cluster {
  int64 id = 1;
  string name = 2;
  string organizationName = 3;
  string provisioningId = 4;
  string ipv4Address = 5;
  string publicKey = 6;
  string privateKey = 7;
  string kubeconfigBase64 = 8;
}